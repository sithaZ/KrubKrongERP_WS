name: erp_mobile
description: A scalable ERP mobile application built with Flutter
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Environment Config
  flutter_dotenv: ^5.1.2

  # Navigation
  go_router: ^13.0.1

  # UI
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0

  # Functional Programming
  fpdart: ^1.1.0

  # Network
  dio: ^5.4.0
  internet_connection_checker: ^1.0.0

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  uuid: ^4.3.3
  intl: ^0.20.2
  mobile_scanner: ^5.1.0
  geolocator: ^12.0.0
  qr_flutter: ^4.1.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.5
  riverpod_lint: ^2.3.7
  custom_lint: ^0.5.7
  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    # - assets/icons/

  # fonts:
  #   - family: Inter
