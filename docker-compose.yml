version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: erp-postgres-db
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: erp_pass
      POSTGRES_DB: erp_pos_db
    ports:
      - "5432:5432"
    volumes:
      - erp_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  erp_pg_data: